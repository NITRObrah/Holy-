<!DOCTYPE html>
<html lang="en">
    <head>
        <link rel="icon" type="image/png" href="favicon.png">
        <link rel="icon" type="image/png" sizes="713x400" href="/favicon.png">
        <link rel="apple-touch-icon" href="/favicon.png">
        <script>
            window.addEventListener('beforeunload', function (event) {
                event.preventDefault();
                event.returnValue = '';
                return 'ames sight.w games';
            });
        </script>
        <script src="https://cdn.jsdelivr.net/gh/gn-math/gn-math.github.io@main/gnmath.js"></script>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>ames sight.w games</title>
        <meta name="title" content="ames sight.w games">
        <meta name="description" content="Play unbl*cked games like Crazy Cattle 3D and DriveMad on ames sight.w. Fast, free, no downloads—perfect for school or home.">
        <meta property="og:type" content="website">
        <meta property="og:url" content="https://gn-math.github.io/">
        <meta name="keywords" content="unbl*cked games, games for school, browser games, chromebook games, no download games, html5 games, free unbl*cked games, ames sight.w">
        <link rel="stylesheet" href="style.css">
        <style>
            button,
            #settings {
                background-color: var(--primary-color, #007bff);
                color: white;
                border: none;
                border-radius: 4px;
                padding: 0.5rem 1rem;
                font-size: 14px;
                cursor: pointer;
                transition: all 0.2s ease;
            }
            button:hover,
            #settings:hover {
                background-color: #0056b3;
                transform: scale(1.02);
                box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
            }
            button:active,
            #settings:active {
                transform: scale(0.98);
            }
            #searchBar,
            #sortOptions {
                padding: 0.5rem;
                border-radius: 4px;
                border: 1px solid #555;
                background-color: #111;
                color: #eee;
            }
        </style>
    </head>
    <body class="dark-mode">
        
        <header>
            <div class="header-content">
                <div class="logo">ames sight.w (games)</div>
                <div class="search-container">
                    <input type="text" id="searchBar" placeholder="Search games..." oninput="filterZones()">
                    <select id="sortOptions" onchange="sortZones()">
                        <option value="name">Name</option>
                        <option value="id">ID (Date)</option>
                        <option value="popular">Popular</option>
                    </select>
                </div>
                <div class="control-buttons">
                    <button id="settings">Settings</button>
                </div>
            </div>
        </header>

        <main>
            <div id="zoneCount">Loading games...</div>
            <div id="container">Loading...</div>
        </main>

        <div id="zoneViewer">
            <div class="zone-header">
                <div class="zone-title">
                    <h2 id="zoneName">game</h2>
                    <span id="zoneId" style="display: none;"></span>
                    <a id="zoneAuthor" href="#" target="_blank">by Author</a>
                </div>
                <div class="zone-controls">
                    <button onclick="fullscreenZone()">Fullscreen</button>
                    <button onclick="aboutBlank()">Open in New Tab</button>
                    <button onclick="downloadZone()">Download</button>
                    <button onclick="closeZone()">Close</button>
                </div>
            </div>
            <iframe id="zoneFrame"></iframe>
        </div>

        <div id="popupOverlay">
            <div class="popup">
                <div class="popup-header">
                    <h3 id="popupTitle">Title</h3>
                    <button id="popupClose" onclick="closePopup()">×</button>
                </div>
                <div id="popupBody">
                    Content will be here
                </div>
            </div>
        </div>

        <footer>
            <div class="footer-links">
                <a href="#" onclick="showContact(); return false;">Contact</a>
                <a href="#" onclick="loadPrivacy(); return false;">Privacy Policy</a>
                <a href="javascript:saveData()">Export Data</a>
                <label for="importData" style="color: var(--primary-color); cursor: pointer;">Import Data</label>
                <input type="file" id="importData" style="display: none;" onchange="loadData(event)">
            </div>
        </footer>

        <script src="script.js"></script>
    </body>
</html>
